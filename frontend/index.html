<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻量级文档编辑器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            color: #333;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 600;
        }
        
        .actions {
            display: flex;
            gap: 10px;
        }
        
        button {
            padding: 8px 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        button:hover {
            background-color: #f5f5f5;
        }
        
        button.primary {
            background-color: #1890ff;
            color: white;
            border-color: #1890ff;
        }
        
        button.primary:hover {
            background-color: #40a9ff;
        }
        
        .editor-container {
            margin-bottom: 20px;
        }
        
        .title-input {
            width: 100%;
            padding: 10px;
            font-size: 20px;
            font-weight: 600;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .content-input {
            width: 100%;
            min-height: 400px;
            padding: 15px;
            font-size: 16px;
            line-height: 1.6;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            resize: vertical;
        }
        
        .doc-list {
            margin-top: 30px;
        }
        
        .doc-item {
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .doc-item:hover {
            background-color: #f5f5f5;
        }
        
        .doc-item h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .doc-item p {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .doc-item .meta {
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>轻量级文档编辑器</h1>
            <div class="actions">
                <button id="new-doc">新建文档</button>
                <button id="save-doc" class="primary">保存</button>
            </div>
        </header>
        
        <div class="editor-container">
            <input type="text" id="doc-title" class="title-input" placeholder="文档标题">
            <textarea id="doc-content" class="content-input" placeholder="开始编写文档..."></textarea>
        </div>
        
        <div class="doc-list" id="doc-list">
            <h2>文档列表</h2>
            <!-- 文档列表将通过JavaScript动态生成 -->
        </div>
    </div>
    
    <script>
        // 全局变量
        let currentDocId = null;
        
        // 初始化页面
        function init() {
            loadDocs();
            setupEventListeners();
        }
        
        // 设置事件监听器
        function setupEventListeners() {
            // 新建文档按钮
            document.getElementById('new-doc').addEventListener('click', function() {
                currentDocId = null;
                document.getElementById('doc-title').value = '';
                document.getElementById('doc-content').value = '';
            });
            
            // 保存文档按钮
            document.getElementById('save-doc').addEventListener('click', saveDoc);
        }
        
        // 加载文档列表
        function loadDocs() {
            fetch('http://localhost:3000/docs')
                .then(response => response.json())
                .then(data => {
                    const docList = document.getElementById('doc-list');
                    docList.innerHTML = '<h2>文档列表</h2>';
                    
                    if (data.length === 0) {
                        docList.innerHTML += '<p>暂无文档</p>';
                        return;
                    }
                    
                    data.forEach(doc => {
                        const docItem = document.createElement('div');
                        docItem.className = 'doc-item';
                        docItem.innerHTML = `
                            <h3>${doc.title}</h3>
                            <p>${doc.content.substring(0, 100)}${doc.content.length > 100 ? '...' : ''}</p>
                            <div class="meta">创建时间: ${new Date(doc.createdAt).toLocaleString()}</div>
                        `;
                        
                        docItem.addEventListener('click', function() {
                            loadDoc(doc.id);
                        });
                        
                        docList.appendChild(docItem);
                    });
                })
                .catch(error => console.error('加载文档列表失败:', error));
        }
        
        // 加载单个文档
        function loadDoc(id) {
            fetch(`http://localhost:3000/docs/${id}`)
                .then(response => response.json())
                .then(data => {
                    currentDocId = data.id;
                    document.getElementById('doc-title').value = data.title;
                    document.getElementById('doc-content').value = data.content;
                })
                .catch(error => console.error('加载文档失败:', error));
        }
        
        // 保存文档
        function saveDoc() {
            const title = document.getElementById('doc-title').value;
            const content = document.getElementById('doc-content').value;
            
            if (!title || !content) {
                alert('请填写文档标题和内容');
                return;
            }
            
            const docData = {
                title,
                content
            };
            
            let url = 'http://localhost:3000/docs';
            let method = 'POST';
            
            if (currentDocId) {
                url += `/${currentDocId}`;
                method = 'PUT';
            }
            
            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(docData)
            })
            .then(response => response.json())
            .then(data => {
                alert('文档保存成功');
                loadDocs();
            })
            .catch(error => console.error('保存文档失败:', error));
        }
        
        // 初始化
        init();
    </script>
</body>
</html>
